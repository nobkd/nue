name: Deploy static content to Pages

on:
  push:
    branches: ["master"]
    paths: ["packages/nuejs.org/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install
      - name: Register nue CLI
        run: |
          cd packages/nuekit
          bun link
          cd -
      - name: Build
        run: nue build -pr packages/nuejs.org
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/nuejs.org/.dist/prod
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
